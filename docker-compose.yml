services:
  postgres:
    image: postgres:16-alpine
    container_name: nextcommerse-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nextcommerse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nextcommerse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
